name: Update events from Meetup

# Refreshes data/events.json from the Meetup iCal feed so the site always
# shows current events with no manual entry.

on:
  schedule:
    - cron: "0 * * * *"      # hourly
  workflow_dispatch: {}       # lets you trigger it manually from the Actions tab
  push:
    branches: [ main ]        # also refresh on every deploy

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch events from Meetup
        run: python3 scripts/build_events.py

      - name: Commit if events changed
        run: |
          if [[ -n "$(git status --porcelain data/events.json)" ]]; then
            git config user.name  "utahagile-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/events.json
            git commit -m "chore: refresh events from Meetup"
            git push
          else
            echo "No event changes."
          fi
